name: violin-erp-lite

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-violin_erp_lite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-violin_local_only}
      POSTGRES_USER: ${POSTGRES_USER:-violin_dev}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 2s
      timeout: 3s
      retries: 15
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - violin-postgres-data:/var/lib/postgresql

volumes:
  violin-postgres-data:
